<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sifer — Calculadora de ROI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07111e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: Arial, Helvetica, sans-serif; }
  .card { background: #0d1b2e; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 600px; color: #fff; }
  .logo { font-weight: 800; font-size: 24px; color: #fff; letter-spacing: 1px; }
  .tagline { font-size: 10px; letter-spacing: 3px; color: #2762EA; text-transform: uppercase; margin-bottom: 2.25rem; margin-top: 2px; }
  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 0.75rem; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .sec-title { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #2762EA; font-weight: 600; margin-bottom: 2px; }
  .ib label { font-size: 12px; color: rgba(255,255,255,0.55); display: block; margin-bottom: 6px; }
  .ib input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(39,98,234,0.25); border-radius: 8px; color: #fff; font-size: 15px; font-family: inherit; padding: 11px 14px; outline: none; transition: border-color 0.2s, background 0.2s; }
  .ib input:focus { border-color: #2762EA; background: rgba(39,98,234,0.1); }
  .ib input::placeholder { color: rgba(255,255,255,0.2); }
  .col-divider { width: 1px; background: rgba(255,255,255,0.07); margin: 0; align-self: stretch; }
  hr { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 1.75rem 0; }
  .res-title { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #2762EA; font-weight: 600; margin-bottom: 1rem; }
  .rgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
  .rgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rc { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.85rem 1rem; }
  .rc-label { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .rc-val { font-size: 18px; font-weight: 700; color: #fff; }
  .be-card { background: rgba(39,98,234,0.18); border: 1.5px solid #2762EA; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .be-num { font-size: 26px; font-weight: 800; color: #4d8cff; white-space: nowrap; }
  .be-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.4; }
  .roi-card { background: rgba(39,98,234,0.1); border: 1px solid rgba(39,98,234,0.35); border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .roi-num { font-size: 26px; font-weight: 800; color: #4d8cff; white-space: nowrap; }
  .roi-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.4; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: rgba(255,255,255,0.2); font-size: 13px; }
  @media (max-width: 500px) {
    .igrid { grid-template-columns: 1fr; }
    .col-divider { display: none; }
    .rgrid { grid-template-columns: 1fr 1fr; }
    .card { padding: 1.75rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Sifer</div>
  <div class="tagline">Tecnología comercial para inmobiliarias</div>

  <div class="igrid">
    <div class="col">
      <div class="sec-title">Tu negocio hoy</div>
      <div class="ib">
        <label>Comisión promedio por venta (USD)</label>
        <input type="number" id="comision" placeholder="ej. 3000" min="0" oninput="calc()">
      </div>
      <div class="ib">
        <label>Tasa de cierre actual (%)</label>
        <input type="number" id="cierre" placeholder="ej. 5" min="0" max="100" oninput="calc()">
      </div>
    </div>

    <div class="col-divider"></div>

    <div class="col">
      <div class="sec-title">Con Sifer</div>
      <div class="ib">
        <label>Total de leads mensuales</label>
        <input type="number" id="leads" placeholder="Completar en reunión" min="0" oninput="calc()">
      </div>
      <div class="ib">
        <label>Inversión aproximada (USD/mes)</label>
        <input type="number" id="precio" placeholder="Completar en reunión" min="0" oninput="calc()">
      </div>
    </div>
  </div>

  <hr>

  <div class="res-title">Proyección total — 12 meses</div>
  <div id="results"><div class="empty">Completá los datos para ver la proyección</div></div>
</div>

<script>
function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function calc() {
  var comision = parseFloat(document.getElementById('comision').value) || 0;
  var cierre   = parseFloat(document.getElementById('cierre').value)   || 0;
  var leads    = parseFloat(document.getElementById('leads').value)    || 0;
  var precio   = parseFloat(document.getElementById('precio').value)   || 0;
  var el = document.getElementById('results');
  if (!comision || !cierre || !leads) {
    el.innerHTML = '<div class="empty">Completá los datos para ver la proyección</div>';
    return;
  }
  var tc       = cierre / 100;
  var ventas12 = leads * tc * 12;
  var ingreso12 = ventas12 * comision;
  var leads12  = Math.round(leads * 12);
  var beVentas = precio > 0 ? Math.ceil((precio * 12) / comision) : null;

  var inversion12 = precio * 12;
  var roi = inversion12 > 0 ? Math.round(((ingreso12 - inversion12) / inversion12) * 100) : null;

  var beHtml = beVentas !== null
    ? '<div class="be-card"><span class="be-num">' + beVentas + ' venta' + (beVentas === 1 ? '' : 's') + '</span><span class="be-text">para que el servicio se pague solo en el año</span></div>'
    : '';

  var roiHtml = roi !== null
    ? '<div class="roi-card"><span class="roi-num">' + roi.toLocaleString('es-AR') + '%</span><span class="roi-text">retorno sobre la inversión anual</span></div>'
    : '';

  el.innerHTML =
    '<div class="rgrid">' +
      '<div class="rc"><div class="rc-label">Leads totales</div><div class="rc-val">' + leads12.toLocaleString('es-AR') + '</div></div>' +
      '<div class="rc"><div class="rc-label">Ventas totales</div><div class="rc-val">' + (ventas12 < 1 ? ventas12.toFixed(1) : Math.round(ventas12)) + '</div></div>' +
      '<div class="rc"><div class="rc-label">Ingresos aproximados</div><div class="rc-val">' + fmt(ingreso12) + '</div></div>' +
      '<div class="rc"><div class="rc-label">Inversión total anual</div><div class="rc-val">' + fmt(inversion12) + '</div></div>' +
    '</div>' +
    (beHtml || roiHtml ? '<div class="rgrid2">' + beHtml + roiHtml + '</div>' : '');
}
</script>
</body>
</html>
